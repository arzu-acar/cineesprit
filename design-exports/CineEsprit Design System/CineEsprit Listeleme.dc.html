<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#0a0a0a}
  ::selection{background:#d8ff3e;color:#0a0a0a}
  a{text-decoration:none;color:inherit}
  .film:hover .poster{border-color:#3a3a3a}
  .film:hover .title{color:#fff}
  .navlink:hover{color:#e8e8e6 !important}
  input::placeholder{color:#5a5a58}
  .searchbox:focus-within{border-color:#3a3a3a}
</style>
</helmet>
<div style="background:#0a0a0a;color:#e8e8e6;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh">

  <!-- NAV -->
  <header style="position:sticky;top:0;z-index:20;background:rgba(10,10,10,0.92);backdrop-filter:blur(8px);border-bottom:1px solid #1c1c1c;display:flex;align-items:center;justify-content:space-between;padding:18px 48px">
    <a href="CineEsprit Anasayfa.dc.html" style="font-family:Georgia,serif;font-style:italic;font-size:23px;letter-spacing:-0.01em">CineEsprit</a>
    <nav style="display:flex;align-items:center;gap:34px">
      <a href="#" class="navlink" style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#d8ff3e">Program</a>
      <a href="#" class="navlink" style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#8a8a88">Arşiv</a>
      <a href="#" class="navlink" style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#8a8a88">Festivaller</a>
      <a href="#" class="navlink" style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#d8ff3e;display:flex;align-items:center;gap:7px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
        Ara
      </a>
    </nav>
  </header>

  <main style="padding:0 48px">

    <!-- SEARCH HEADER -->
    <section style="padding:56px 0 30px;border-bottom:1px solid #1c1c1c">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.2em;color:#6a6a68;margin-bottom:22px">KATALOG / ARAMA</div>
      <div class="searchbox" style="display:flex;align-items:center;gap:16px;border:1px solid #242424;background:#0d0d0d;border-radius:3px;padding:18px 22px;max-width:720px;transition:border-color .18s">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6a6a68" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
        <input value="{{ query }}" onInput="{{ onSearch }}" placeholder="Film, yönetmen veya ülke ara…" style="flex:1;background:transparent;border:none;outline:none;color:#e8e8e6;font-family:Georgia,serif;font-style:italic;font-size:22px"/>
        <sc-if value="{{ query }}" hint-placeholder-val="">
          <button onClick="{{ clearSearch }}" style="background:transparent;border:none;color:#6a6a68;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.12em;cursor:pointer">TEMİZLE ✕</button>
        </sc-if>
      </div>
    </section>

    <!-- FILTERS -->
    <section style="padding:28px 0;border-bottom:1px solid #1c1c1c;display:flex;flex-direction:column;gap:18px">
      <sc-for list="{{ filterGroups }}" as="grp" hint-placeholder-count="3">
        <div style="display:flex;align-items:center;gap:16px">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#6a6a68;width:90px;flex:none">{{ grp.label }}</span>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            <sc-for list="{{ grp.options }}" as="opt" hint-placeholder-count="4">
              <button onClick="{{ opt.onClick }}" style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.12em;padding:6px 11px;border-radius:2px;cursor:pointer;background:{{ opt.bg }};color:{{ opt.color }};border:1px solid {{ opt.border }}">{{ opt.label }}</button>
            </sc-for>
          </div>
        </div>
      </sc-for>
    </section>

    <!-- RESULT BAR -->
    <section style="padding:24px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;color:#9a9a98"><span style="color:#d8ff3e">{{ count }}</span> FİLM BULUNDU</div>
      <div style="display:flex;align-items:center;gap:14px">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#6a6a68">SIRALA</span>
        <div style="display:flex;gap:6px">
          <sc-for list="{{ sortOptions }}" as="s" hint-placeholder-count="3">
            <button onClick="{{ s.onClick }}" style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.1em;padding:6px 11px;border-radius:2px;cursor:pointer;background:transparent;color:{{ s.color }};border:1px solid {{ s.border }}">{{ s.label }}</button>
          </sc-for>
        </div>
      </div>
    </section>

    <!-- GRID -->
    <section style="padding:8px 0 96px">
      <sc-if value="{{ hasResults }}" hint-placeholder-val="{{ true }}">
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:24px">
          <sc-for list="{{ results }}" as="film" hint-placeholder-count="10">
            <a href="#" class="film" style="display:block">
              <div class="poster" style="aspect-ratio:2/3;background:repeating-linear-gradient(135deg,#1a1a1a 0 10px,#151515 10px 20px);border:1px solid #242424;border-radius:3px;position:relative;display:flex;align-items:flex-start;padding:11px;transition:border-color .18s">
                <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.12em;color:{{ film.tagColor }};border:1px solid {{ film.tagBorder }};padding:4px 6px;background:#0a0a0a">{{ film.cat }}</span>
              </div>
              <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.12em;color:#6a6a68;margin:13px 0 6px">{{ film.meta }}</div>
              <h3 class="title" style="font-family:Georgia,serif;font-style:italic;font-weight:400;font-size:17px;line-height:1.18;margin:0;transition:color .18s">{{ film.title }}</h3>
            </a>
          </sc-for>
        </div>
      </sc-if>
      <sc-if value="{{ empty }}" hint-placeholder-val="">
        <div style="padding:90px 0;text-align:center">
          <div style="font-family:Georgia,serif;font-style:italic;font-size:26px;color:#6a6a68;margin-bottom:12px">Sonuç bulunamadı</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;color:#4a4a48">FİLTRELERİ GENİŞLETMEYİ DENEYİN</div>
        </div>
      </sc-if>
    </section>

  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { query: "", cat: "Tümü", fest: "Tümü", decade: "Tümü", sort: "Yıl ↓" };

  data() {
    return [
      { title: "Sessiz Işığın Coğrafyası", cat: "Auteur", fest: "Cannes", year: 2026, country: "TÜRKİYE", dir: "Deniz Akça", min: 138 },
      { title: "Persona'nın Gölgesi", cat: "Auteur", fest: "Venedik", year: 1966, country: "İTALYA", dir: "I. Bergman", min: 110 },
      { title: "Mevsimsiz Kar", cat: "Auteur", fest: "Berlinale", year: 1972, country: "JAPONYA", dir: "M. Kobayashi", min: 140 },
      { title: "Durgun Sular Bölgesi", cat: "Auteur", fest: "Cannes", year: 1979, country: "SSCB", dir: "A. Tarkovski", min: 163 },
      { title: "Beyaz Gürültünün İçinde", cat: "Auteur", fest: "Cannes", year: 2026, country: "FRANSA", dir: "C. Léaud", min: 128 },
      { title: "Kuzeyin Son Treni", cat: "Bağımsız", fest: "Berlinale", year: 2025, country: "ROMANYA", dir: "R. Mungiu", min: 122 },
      { title: "Toz ve Bakır", cat: "Bağımsız", fest: "Venedik", year: 2024, country: "ARJANTİN", dir: "L. Alonso", min: 98 },
      { title: "Çay Bahçesinde Akşam", cat: "Bağımsız", fest: "Locarno", year: 2026, country: "GÜRCİSTAN", dir: "D. Kvirikadze", min: 104 },
      { title: "Lizbon'a Mektuplar", cat: "Bağımsız", fest: "Locarno", year: 2025, country: "PORTEKİZ", dir: "P. Costa", min: 117 },
      { title: "Işık Üzerine Çalışmalar", cat: "Deneysel", fest: "Rotterdam", year: 2023, country: "ALMANYA", dir: "H. Farocki", min: 67 },
      { title: "Hareketin Anatomisi", cat: "Deneysel", fest: "Rotterdam", year: 1968, country: "ABD", dir: "S. Brakhage", min: 45 },
      { title: "Sentetik Hafıza", cat: "Deneysel", fest: "Berlinale", year: 2026, country: "KORE", dir: "J. Park", min: 72 },
      { title: "Çerçevenin Dışı", cat: "Deneysel", fest: "Rotterdam", year: 2024, country: "KANADA", dir: "M. Snow", min: 53 },
      { title: "Mavi Saatte Üç Kadın", cat: "Bağımsız", fest: "Venedik", year: 2024, country: "İSPANYA", dir: "C. Simón", min: 109 },
      { title: "Yer Altı Güneşi", cat: "Auteur", fest: "Berlinale", year: 2025, country: "İRAN", dir: "J. Panahi", min: 121 },
    ];
  }

  catColor(cat) {
    if (cat === "Auteur") return { color: "#d8ff3e", border: "#d8ff3e" };
    return { color: "#c8c8c6", border: "#3a3a3a" };
  }

  decadeOf(y) {
    if (y >= 2020) return "2020'ler";
    if (y >= 2000) return "2000'ler";
    if (y >= 1980) return "1980 öncesi";
    return "1980 öncesi";
  }

  computeResults() {
    let r = this.data();
    const q = this.state.query.trim().toLowerCase();
    if (q) r = r.filter(f => (f.title + " " + f.dir + " " + f.country).toLowerCase().includes(q));
    if (this.state.cat !== "Tümü") r = r.filter(f => f.cat === this.state.cat);
    if (this.state.fest !== "Tümü") r = r.filter(f => f.fest === this.state.fest);
    if (this.state.decade !== "Tümü") r = r.filter(f => this.decadeOf(f.year) === this.state.decade);
    if (this.state.sort === "Yıl ↓") r = [...r].sort((a,b) => b.year - a.year);
    else if (this.state.sort === "Yıl ↑") r = [...r].sort((a,b) => a.year - b.year);
    else if (this.state.sort === "A–Z") r = [...r].sort((a,b) => a.title.localeCompare(b.title, "tr"));
    return r;
  }

  chip(active) {
    return active
      ? { bg: "#d8ff3e", color: "#0a0a0a", border: "#d8ff3e" }
      : { bg: "transparent", color: "#9a9a98", border: "#2e2e2e" };
  }

  makeGroup(label, key, opts) {
    return {
      label,
      options: opts.map(o => {
        const c = this.chip(this.state[key] === o);
        return { label: o, ...c, onClick: () => this.setState({ [key]: o }) };
      })
    };
  }

  renderVals() {
    const results = this.computeResults();
    const sorts = ["Yıl ↓", "Yıl ↑", "A–Z"];
    return {
      query: this.state.query,
      onSearch: (e) => this.setState({ query: e.target.value }),
      clearSearch: () => this.setState({ query: "" }),
      filterGroups: [
        this.makeGroup("KATEGORİ", "cat", ["Tümü", "Bağımsız", "Auteur", "Deneysel"]),
        this.makeGroup("FESTİVAL", "fest", ["Tümü", "Cannes", "Venedik", "Berlinale", "Locarno", "Rotterdam"]),
        this.makeGroup("DÖNEM", "decade", ["Tümü", "2020'ler", "2000'ler", "1980 öncesi"]),
      ],
      sortOptions: sorts.map(s => {
        const a = this.state.sort === s;
        return { label: s, color: a ? "#d8ff3e" : "#9a9a98", border: a ? "#d8ff3e" : "#2e2e2e", onClick: () => this.setState({ sort: s }) };
      }),
      count: String(results.length).padStart(2, "0"),
      hasResults: results.length > 0,
      empty: results.length === 0,
      results: results.map(f => {
        const c = this.catColor(f.cat);
        return {
          title: f.title,
          cat: f.cat.toUpperCase(),
          tagColor: c.color,
          tagBorder: c.border,
          meta: f.year + " · " + f.country + " · " + f.min + " DK"
        };
      })
    };
  }
}
</script>
</body>
</html>
